name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build cross-platform binaries
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          set -e
          LDFLAGS="-s -w -X main.version=${TAG}"
          BINARY=pflogsumm-go
          DIST=dist

          mkdir -p "$DIST"

          declare -a TARGETS=(
            "linux amd64 "
            "linux arm64 "
            "linux arm 7"
            "darwin amd64 "
            "darwin arm64 "
            "freebsd amd64 "
            "windows amd64 "
          )

          for target in "${TARGETS[@]}"; do
            read -r os arch goarm <<< "$target"

            if [ "$os" = "windows" ]; then
              bin="${BINARY}.exe"
            else
              bin="${BINARY}"
            fi

            archive_name="${BINARY}_${os}_${arch}"

            echo "Building ${os}/${arch}..."
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" GOARM="$goarm" \
              go build -ldflags "$LDFLAGS" -o "${DIST}/${bin}" .

            staging="${DIST}/staging_${archive_name}"
            mkdir -p "$staging"
            cp "${DIST}/${bin}" "$staging/"
            cp LICENSE README.md "$staging/"

            if [ "$os" = "windows" ]; then
              (cd "$staging" && zip -q "../${archive_name}.zip" *)
            else
              tar -czf "${DIST}/${archive_name}.tar.gz" -C "$staging" .
            fi

            rm -rf "$staging" "${DIST}/${bin}"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*.tar.gz dist/*.zip dist/checksums.txt
